name: dotnet test

on : [push]

jobs:
  run-tests:
    runs-on: ubuntu-latest    
    steps:
       - uses: actions/checkout@v5
       - name: Setup dotnet 10
         uses: actions/setup-dotnet@v4
         with: 
           dotnet-version: 10.0.x
       - name: Restore
         run: dotnet restore
       - name: Build
         run: dotnet build --no-restore
       - name: Run unit tests
         run: dotnet test --no-build --verbosity normal